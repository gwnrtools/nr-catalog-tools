site_name: nr-catalog-tools
site_description: A stable, unified Python interface to NR binary black-hole waveform catalogs for LVK analyses, waveform modeling, and cross-catalog comparison
site_url: https://gwnrtools.github.io/nr-catalog-tools/
repo_url: https://github.com/gwnrtools/nr-catalog-tools
repo_name: gwnrtools/nr-catalog-tools

docs_dir: docs

nav:
  - Home: index.md
  - Catalog Reference: catalogs.md
  - WaveformModes Guide: waveform.md
  - API Reference:
      - Overview: api/index.md
      - catalog: api/catalog.md
      - rit: api/rit.md
      - sxs: api/sxs.md
      - maya: api/maya.md
      - waveform: api/waveform.md
      - metadata: api/metadata.md
      - registry: api/registry.md
      - lvc: api/lvc.md
      - utils: api/utils.md
  - Tutorials:
      - Loading a waveform: tutorials/load-waveform.md
      - Cross-catalog comparison: tutorials/cross-catalog.md
  - Architecture: architecture.md
  - Package Internals: package.md
  - Scientific Goal: goal.md

theme:
  name: material
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy

plugins:
  - search
  - mkdocstrings:
      default_handler: python
      handlers:
        python:
          paths: [.]
          options:
            docstring_style: google
            show_source: true
            show_root_heading: true
            show_root_full_path: false
            show_symbol_type_heading: true
            show_symbol_type_toc: true
            members_order: source
            separate_signature: true
            show_signature_annotations: true
            # Use static analysis only — avoids importing heavy runtime deps
            # (lalsuite, pycbc, sxs) during the docs build.
            allow_inspection: false

markdown_extensions:
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - admonition
  - tables
  - toc:
      permalink: true

extra_javascript:
  - https://polyfill.io/v3/polyfill.min.js?features=es6
  - https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js
