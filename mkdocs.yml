site_name: nr-catalog-tools
site_description: A unified Python interface to NR binary black-hole waveform catalogs
site_url: https://gwnrtools.github.io/nr-catalog-tools/
repo_url: https://github.com/gwnrtools/nr-catalog-tools
repo_name: gwnrtools/nr-catalog-tools

docs_dir: docs

nav:
  - Home: index.md
  - Catalog Reference: catalogs.md
  - WaveformModes API: waveform.md
  - Architecture: architecture.md
  - Package Internals: package.md
  - Scientific Goal: goal.md

theme:
  name: material
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy

markdown_extensions:
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - admonition
  - tables
  - toc:
      permalink: true

extra_javascript:
  - https://polyfill.io/v3/polyfill.min.js?features=es6
  - https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js
